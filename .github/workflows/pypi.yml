name: Publish to PyPI and crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: auto
          # macOS Intel (cross-compile on ARM runner)
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i python3.10 python3.11 python3.12 python3.13
          sccache: "true"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/yantrikdb
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Idempotent crates.io publish.  Replaces a blanket
      # `continue-on-error: true` that previously swallowed real publish
      # failures (mirrors the yantrikos/yantrikdb-server v0.7.3 silent-failure
      # incident).  exit 0 on success OR if the version is already published;
      # exit non-zero on any other failure so the workflow status surfaces it.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out="$(cargo publish -p yantrikdb 2>&1)"
          rc=$?
          set -e
          echo "$out"
          if [[ $rc -eq 0 ]]; then
            echo "::notice::yantrikdb: published to crates.io"
            exit 0
          fi
          if echo "$out" | grep -qE "already exists on crates\.io"; then
            echo "::notice::yantrikdb: already published at this version (idempotent re-run)"
            exit 0
          fi
          echo "::error::yantrikdb: crates.io publish failed for a non-idempotent reason"
          exit "$rc"
